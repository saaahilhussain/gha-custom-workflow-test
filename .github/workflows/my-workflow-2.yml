name: sequential job test
on: push

jobs:
  job-1:
    runs-on: ubuntu-latest

    steps:
      - name: print working directory
        run: pwd

      - name: print user name
        run: uname -a

  job-2:
    runs-on: ubuntu-latest
    needs: job-1

    steps:
      - name: write javascript
        run: echo "console.log('Hello from Github Actions!')" > app.js

      - name: run javascript file
        run: node app.js
